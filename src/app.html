<!doctype html>
<html lang="pl">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#eef1f2" />
		<script>
			// Runs before anything is painted, so the page never flashes the
			// wrong theme while the rest of the app boots. Kept intentionally
			// tiny and dependency-free — it has to run synchronously, blocking,
			// before first paint.
			(function () {
				try {
					var stored = localStorage.getItem('angmatura-theme');
					var theme =
							stored === 'light' || stored === 'dark'
									? stored
									: window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
											? 'dark'
											: 'light';
					document.documentElement.setAttribute('data-theme', theme);
				} catch (e) {
					// localStorage/matchMedia unavailable — the app falls back to
					// the light theme defined on :root, which is still correct.
				}
			})();
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
				href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Atkinson+Hyperlegible+Next:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
